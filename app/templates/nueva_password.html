<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>EcoVision AI — Nueva contraseña</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>

<body>
    <div class="page-wrapper">

        <div class="bg-circles">
            <div class="circle c1"></div>
            <div class="circle c2"></div>
            <div class="circle c3"></div>
        </div>

        <div class="auth-card">

            <div class="brand">
                <div class="logo-ring">
                    <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                        <circle cx="15" cy="15" r="12" stroke="#52b788" stroke-width="1.5" />
                        <path d="M15 7 C11 10 9 13 11 17 C13 20 17 20 19 17 C21 13 19 10 15 7Z" fill="#52b788"
                            opacity="0.85" />
                    </svg>
                </div>
                <h1>EcoVision <span>AI</span></h1>
                <p>Crea tu nueva contraseña</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="/recuperar/{{ token }}" method="POST" novalidate>

                <div class="field">
                    <label>Nueva contraseña</label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 20 20" fill="none">
                            <rect x="5" y="9" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3" />
                            <path d="M7 9V7a3 3 0 0 1 6 0v2" stroke="currentColor" stroke-width="1.3"
                                stroke-linecap="round" />
                        </svg>
                        <input type="password" name="password" id="new-pw" placeholder="Mínimo 8 caracteres"
                            oninput="evalFortaleza(this)" required>
                        <button type="button" class="toggle-pw" onclick="togglePw('new-pw', this)">
                            <svg viewBox="0 0 20 20" fill="none" width="14" height="14">
                                <path d="M2 10s3-5 8-5 8 5 8 5-3 5-8 5-8-5-8-5z" stroke="currentColor"
                                    stroke-width="1.3" />
                                <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.3" />
                            </svg>
                        </button>
                    </div>
                    <div class="strength-bar">
                        <div class="strength-seg" id="s1"></div>
                        <div class="strength-seg" id="s2"></div>
                        <div class="strength-seg" id="s3"></div>
                        <div class="strength-seg" id="s4"></div>
                    </div>
                </div>

                <div class="field">
                    <label>Confirmar contraseña</label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 20 20" fill="none">
                            <rect x="5" y="9" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3" />
                            <path d="M7 9V7a3 3 0 0 1 6 0v2" stroke="currentColor" stroke-width="1.3"
                                stroke-linecap="round" />
                        </svg>
                        <input type="password" name="confirmar" id="confirm-pw" placeholder="Repite tu contraseña"
                            oninput="checkMatch()" required>
                    </div>
                    <span class="field-hint" id="hint-match"></span>
                </div>

                <button type="submit" class="btn-main">Guardar nueva contraseña</button>

            </form>

        </div>

        <p class="footer-copy">EcoVision AI &copy; 2024 — Proyecto universitario</p>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>

</html>
